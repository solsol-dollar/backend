server:
  port: 8081

spring:
  application:
    name: eclipse-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/eclipse?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        default_batch_fetch_size: 100
  modulith:
    events:
      externalization:
        enabled: false
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-sonnet-4-6
          temperature: 0.2
          max-tokens: 2048

ls:
  securities:
    base-url: ${LS_BASE_URL:https://openapi.ls-sec.co.kr:8080}
    ws-url: ${LS_WS_URL:wss://openapi.ls-sec.co.kr:9443/websocket}
    app-key: ${LS_APP_KEY:}
    app-secret: ${LS_APP_SECRET:}

logging:
  level:
    com.shinhan.eclipse: INFO
