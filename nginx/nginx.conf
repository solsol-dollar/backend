worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout 65;

    # CORS 허용 Origin
    # 프로덕션에서는 실제 도메인으로 변경하세요.
    # envsubst를 사용하려면: envsubst '${ALLOWED_ORIGIN}' < nginx.conf.template > nginx.conf
    # 현재는 * (전체 허용) — 필요 시 특정 도메인으로 교체하세요.
    map $http_origin $cors_origin {
        default "";
        "http://localhost:5173" "http://localhost:5173";
        # "https://your-domain.com" "https://your-domain.com";
    }

    upstream ledger_backend {
        server ledger-app:8080;
    }

    upstream service_backend {
        server service-app:8081;
    }

    server {
        listen 80;
        server_name _;

        # Nginx 자체 헬스체크
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # ledger-app 라우팅: /api/ledger/** → ledger-app:8080/**
        location /api/ledger/ {
            # CORS 헤더
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-User-Id" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-User-Id" always;
                add_header Access-Control-Max-Age 1728000;
                add_header Content-Type "text/plain charset=UTF-8";
                add_header Content-Length 0;
                return 204;
            }

            # /api/ledger prefix 제거 후 upstream으로 전달
            rewrite ^/api/ledger(/.*)$ $1 break;

            proxy_pass http://ledger_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # SSE 실시간 환율 — 버퍼링 끄고 타임아웃 길게
        location /api/v1/exchange/rate/stream {
            proxy_pass http://service_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
        }

        # service-app 라우팅: /api/v1/** → service-app:8081/** (프론트 직접 경로)
        location /api/v1/ {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-User-Id" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-User-Id" always;
                add_header Access-Control-Max-Age 1728000;
                add_header Content-Type "text/plain charset=UTF-8";
                add_header Content-Length 0;
                return 204;
            }

            proxy_pass http://service_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # ledger-app Swagger UI (서브리소스 포함)
        location /api/ledger/swagger-ui {
            proxy_redirect /swagger-ui/ /api/ledger/swagger-ui/;
            rewrite ^/api/ledger(/.*)$ $1 break;
            proxy_pass http://ledger_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # service-app Swagger UI (서브리소스 포함)
        location /api/service/swagger-ui {
            proxy_redirect /swagger-ui/ /api/service/swagger-ui/;
            rewrite ^/api/service(/.*)$ $1 break;
            proxy_pass http://service_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Swagger UI WebJars 정적 리소스
        location /webjars/ {
            proxy_pass http://service_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # service-app 라우팅: /api/service/** → service-app:8081/** (prefix 제거 경로)
        location /api/service/ {
            # CORS 헤더
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-User-Id" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-User-Id" always;
                add_header Access-Control-Max-Age 1728000;
                add_header Content-Type "text/plain charset=UTF-8";
                add_header Content-Length 0;
                return 204;
            }

            # /api/service prefix 제거 후 upstream으로 전달
            rewrite ^/api/service(/.*)$ $1 break;

            proxy_pass http://service_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # WebSocket 지원 (service-app의 실시간 시세 SockJS)
        location /api/service/ws {
            rewrite ^/api/service(/.*)$ $1 break;

            proxy_pass http://service_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_read_timeout 3600s;
        }
    }

    # HTTPS 블록 예시 (Let's Encrypt certbot 설정 후 활성화)
    # certbot --nginx -d your-domain.com 실행 후 아래 블록이 자동 생성됩니다.
    # 수동으로 설정할 경우 아래 주석을 해제하고 도메인을 교체하세요.
    #
    # server {
    #     listen 443 ssl;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    #     include             /etc/letsencrypt/options-ssl-nginx.conf;
    #     ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
    #
    #     location /api/ledger/ {
    #         rewrite ^/api/ledger(/.*)$ $1 break;
    #         proxy_pass http://ledger_backend;
    #         proxy_set_header Host              $host;
    #         proxy_set_header X-Real-IP         $remote_addr;
    #         proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto https;
    #         proxy_read_timeout 60s;
    #     }
    #
    #     location /api/service/ {
    #         rewrite ^/api/service(/.*)$ $1 break;
    #         proxy_pass http://service_backend;
    #         proxy_set_header Host              $host;
    #         proxy_set_header X-Real-IP         $remote_addr;
    #         proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto https;
    #         proxy_read_timeout 60s;
    #     }
    # }
    #
    # HTTP -> HTTPS 리다이렉트
    # server {
    #     listen 80;
    #     server_name your-domain.com;
    #     return 301 https://$host$request_uri;
    # }
}
