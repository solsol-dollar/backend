spring:
  datasource:
    url: jdbc:h2:mem:eclipse-test;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  modulith:
    events:
      externalization:
        enabled: false

jwt:
  public-key: classpath:keys/public.pem
  expiration-ms: 3600000
  provider-enabled: false

logging:
  level:
    com.shinhan.eclipse: INFO
