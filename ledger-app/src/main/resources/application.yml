server:
  port: 8080

spring:
  application:
    name: eclipse-ledger
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/eclipse?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        default_batch_fetch_size: 100
  modulith:
    events:
      externalization:
        enabled: false

logging:
  level:
    com.shinhan.eclipse: INFO
