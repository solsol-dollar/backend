# GitHub Actions CD 워크플로우 — Eclipse Backend
#
# 필요한 GitHub Secrets:
#   EC2_HOST  — EC2 퍼블릭 IP
#   EC2_USER  — EC2 접속 사용자 (ubuntu)
#
# 나머지 시크릿은 AWS Secrets Manager에서 OIDC로 조회합니다:
#   eclipse/prod/ec2-ssh-key     — EC2 SSH Private Key
#   eclipse/prod/ghcr-pat        — GHCR PAT (read:packages)
#   eclipse/prod/env             — .env 파일 전체 내용
#   eclipse/prod/jwt-private-key — JWT RSA Private Key

name: CD

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
  AWS_ROLE_ARN: arn:aws:iam::496009355626:role/eclipse-github-actions-role
  AWS_REGION: ap-northeast-2

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get GHCR PAT from Secrets Manager
        id: secrets
        run: |
          GHCR_PAT=$(aws secretsmanager get-secret-value \
            --secret-id eclipse/prod/ghcr-pat \
            --query SecretString --output text)
          echo "::add-mask::$GHCR_PAT"
          echo "GHCR_PAT=$GHCR_PAT" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ steps.secrets.outputs.GHCR_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push ledger-app
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ledger-app/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/eclipse-ledger-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push service-app
        uses: docker/build-push-action@v5
        with:
          context: .
          file: service-app/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/eclipse-service-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push worker-app
        uses: docker/build-push-action@v5
        with:
          context: .
          file: worker-app/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/eclipse-worker-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get secrets from Secrets Manager
        id: secrets
        run: |
          EC2_SSH_KEY=$(aws secretsmanager get-secret-value \
            --secret-id eclipse/prod/ec2-ssh-key \
            --query SecretString --output text)
          echo "::add-mask::$EC2_SSH_KEY"
          {
            echo "EC2_SSH_KEY<<EOF"
            echo "$EC2_SSH_KEY"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          GHCR_PAT=$(aws secretsmanager get-secret-value \
            --secret-id eclipse/prod/ghcr-pat \
            --query SecretString --output text)
          echo "::add-mask::$GHCR_PAT"
          echo "GHCR_PAT=$GHCR_PAT" >> $GITHUB_OUTPUT

      - name: Upload docker-compose.yml and nginx/ to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ steps.secrets.outputs.EC2_SSH_KEY }}
          source: "docker-compose.yml,nginx/"
          target: "/app/eclipse/"

      - name: Fetch secrets from AWS Secrets Manager, then deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_PAT: ${{ steps.secrets.outputs.GHCR_PAT }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ steps.secrets.outputs.EC2_SSH_KEY }}
          envs: GHCR_PAT,GITHUB_ACTOR
          script: |
            mkdir -p /app/eclipse/keys

            # .env (EC2 IAM Role → Secrets Manager)
            aws secretsmanager get-secret-value \
              --secret-id eclipse/prod/env \
              --region ap-northeast-2 \
              --query SecretString \
              --output text > /app/eclipse/.env
            chmod 600 /app/eclipse/.env

            # JWT private key (EC2 IAM Role → Secrets Manager)
            aws secretsmanager get-secret-value \
              --secret-id eclipse/prod/jwt-private-key \
              --region ap-northeast-2 \
              --query SecretString \
              --output text > /app/eclipse/keys/private.pem
            chmod 600 /app/eclipse/keys/private.pem

            # GHCR 로그인 → 이미지 pull → 재시작
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            cd /app/eclipse
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
