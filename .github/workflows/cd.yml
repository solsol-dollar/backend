# GitHub Actions CD 워크플로우 — Eclipse Backend
#
# 필요한 GitHub Secrets:
#   EC2_HOST         — EC2 퍼블릭 IP (예: 52.79.99.81)
#   EC2_USER         — EC2 접속 사용자 (ubuntu)
#   EC2_SSH_KEY      — jooeon-key-pair.pem 전체 내용
#   GHCR_PAT         — GitHub PAT (read:packages 권한) — EC2에서 이미지 pull용
#   ENV_FILE         — .env 파일 전체 내용 (멀티라인 Secret)
#   JWT_PRIVATE_KEY  — private.pem 전체 내용 (멀티라인 Secret)

name: CD

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push ledger-app
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ledger-app/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/eclipse-ledger-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push service-app
        uses: docker/build-push-action@v5
        with:
          context: .
          file: service-app/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/eclipse-service-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push worker-app
        uses: docker/build-push-action@v5
        with:
          context: .
          file: worker-app/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/eclipse-worker-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload docker-compose.yml and nginx/ to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,nginx/"
          target: "/app/eclipse/"

      - name: Write .env and JWT key, then deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GITHUB_ACTOR: ${{ github.actor }}
          ENV_FILE: ${{ secrets.ENV_FILE }}
          JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GHCR_PAT,GITHUB_ACTOR,ENV_FILE,JWT_PRIVATE_KEY
          script: |
            mkdir -p /app/eclipse/keys

            # .env 파일 (GitHub Secret → EC2)
            echo "$ENV_FILE" > /app/eclipse/.env
            chmod 600 /app/eclipse/.env

            # JWT private key (GitHub Secret → EC2)
            echo "$JWT_PRIVATE_KEY" > /app/eclipse/keys/private.pem
            chmod 600 /app/eclipse/keys/private.pem

            # GHCR 로그인 → 이미지 pull → 재시작
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            cd /app/eclipse
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
