services:
  nginx:
    image: nginx:alpine
    container_name: eclipse_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - ledger-app
      - service-app
    restart: unless-stopped

  ledger-app:
    image: ghcr.io/solsol-dollar/eclipse-ledger-app:latest
    build:
      context: .
      dockerfile: ledger-app/Dockerfile
    container_name: eclipse_ledger
    expose:
      - "8080"
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-classpath:keys/public.pem}
      SPRINGDOC_SWAGGER_UI_CONFIG_URL: /api/ledger/api-docs/swagger-config
      SPRINGDOC_SWAGGER_UI_URL: /api/ledger/api-docs
    volumes:
      - ./keys:/app/keys:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  service-app:
    image: ghcr.io/solsol-dollar/eclipse-service-app:latest
    build:
      context: .
      dockerfile: service-app/Dockerfile
    container_name: eclipse_service
    expose:
      - "8081"
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      KIS_BASE_URL: ${KIS_BASE_URL}
      KIS_APP_KEY: ${KIS_APP_KEY}
      KIS_APP_SECRET: ${KIS_APP_SECRET}
      LS_BASE_URL: ${LS_BASE_URL}
      LS_WS_URL: ${LS_WS_URL}
      LS_APP_KEY: ${LS_APP_KEY}
      LS_APP_SECRET: ${LS_APP_SECRET}
      EXIMBANK_BASE_URL: ${EXIMBANK_BASE_URL}
      EXIMBANK_AUTH_KEY: ${EXIMBANK_AUTH_KEY}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY}
      FMP_API_KEY: ${FMP_API_KEY}
      LEDGER_URL: http://ledger-app:8080
      JWT_PRIVATE_KEY_PATH: ${JWT_PRIVATE_KEY_PATH:-/app/keys/private.pem}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-classpath:keys/public.pem}
      SPRINGDOC_SWAGGER_UI_CONFIG_URL: /api/service/api-docs/swagger-config
      SPRINGDOC_SWAGGER_UI_URL: /api/service/api-docs
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      ledger-app:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  worker-app:
    image: ghcr.io/solsol-dollar/eclipse-worker-app:latest
    build:
      context: .
      dockerfile: worker-app/Dockerfile
    container_name: eclipse_worker
    expose:
      - "8082"
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      KIS_BASE_URL: ${KIS_BASE_URL}
      KIS_APP_KEY: ${KIS_APP_KEY}
      KIS_APP_SECRET: ${KIS_APP_SECRET}
      LS_BASE_URL: ${LS_BASE_URL}
      LS_APP_KEY: ${LS_APP_KEY}
      LS_APP_SECRET: ${LS_APP_SECRET}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
